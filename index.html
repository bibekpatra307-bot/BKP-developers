<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BKP Developers — Innovate. Develop. Deliver.</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c3df4;
            --primary-light: #8b6cf7;
            --primary-dark: #5128c7;
            --secondary: #0b1124;
            --bg-light: #f8faff;
            --text-dark: #0b1124;
            --text-gray: #5a6473;
            --text-light: #8892a0;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(108, 61, 244, 0.12);
            --shadow-hover: 0 30px 80px rgba(108, 61, 244, 0.20);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 28px rgba(108, 61, 244, 0.30);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(108, 61, 244, 0.40);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px 32px;
            border-radius: 50px;
            border: 2px solid #d0d7e6;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(108, 61, 244, 0.08);
        }

        /* ===== HEADER / NAV ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.30);
            transition: var(--transition);
        }
        .header.scrolled {
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06);
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 76px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.5px;
            color: var(--text-dark);
        }
        .logo span {
            color: var(--primary);
        }
        .logo i {
            font-size: 1.6rem;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .nav-links a {
            font-weight: 500;
            font-size: 0.92rem;
            color: var(--text-gray);
            transition: var(--transition);
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            margin-left: 8px;
        }
        .nav-cta .btn-primary {
            padding: 10px 24px;
            font-size: 0.85rem;
            box-shadow: 0 6px 20px rgba(108, 61, 244, 0.25);
        }

        /* Mobile toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
        }
        .menu-toggle span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--text-dark);
            border-radius: 4px;
            transition: var(--transition);
        }
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== HERO ===== */
        .hero {
            padding: 160px 0 100px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(108, 61, 244, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 61, 244, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(108, 61, 244, 0.10);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.82rem;
            padding: 6px 18px 6px 8px;
            border-radius: 50px;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }
        .hero-badge i {
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            padding: 4px;
            font-size: 0.6rem;
        }

        .hero h1 {
            font-size: 3.4rem;
            font-weight: 900;
            line-height: 1.12;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-gray);
            max-width: 480px;
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 48px;
        }

        .hero-stats {
            display: flex;
            gap: 48px;
            padding-top: 16px;
            border-top: 2px solid rgba(108, 61, 244, 0.08);
        }
        .hero-stats .stat h3 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
        }
        .hero-stats .stat h3 span {
            color: var(--primary);
        }
        .hero-stats .stat p {
            font-size: 0.85rem;
            color: var(--text-light);
            margin: 0;
        }

        /* Hero right — visual */
        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .hero-visual .orb {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(108, 61, 244, 0.12), rgba(167, 139, 250, 0.06));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }
        .hero-visual .orb-inner {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 80px rgba(108, 61, 244, 0.25);
            color: #fff;
            font-size: 5rem;
            font-weight: 900;
        }
        .hero-visual .orb-inner i {
            font-size: 6rem;
        }
        .hero-visual .floating-tag {
            position: absolute;
            background: var(--white);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: float 4s ease-in-out infinite reverse;
        }
        .hero-visual .floating-tag:nth-child(2) {
            top: 10%;
            right: 0;
            animation-delay: 0.5s;
        }
        .hero-visual .floating-tag:nth-child(3) {
            bottom: 20%;
            left: -10%;
            animation-delay: 1s;
        }
        .hero-visual .floating-tag i {
            color: var(--primary);
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* ===== SERVICES ===== */
        .services {
            padding: 100px 0 80px;
            background: var(--white);
        }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .section-label i {
            font-size: 0.7rem;
        }

        .section-title {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .section-sub {
            font-size: 1.05rem;
            color: var(--text-gray);
            max-width: 560px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 48px;
        }

        .service-card {
            background: var(--bg-light);
            padding: 36px 28px 32px;
            border-radius: var(--radius);
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            opacity: 0;
            transition: var(--transition);
        }
        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(108, 61, 244, 0.12);
            box-shadow: var(--shadow-hover);
            background: var(--white);
        }
        .service-card:hover::before {
            opacity: 1;
        }

        .service-card .icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: rgba(108, 61, 244, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 18px;
            transition: var(--transition);
        }
        .service-card:hover .icon {
            background: var(--primary);
            color: #fff;
            transform: scale(1.05);
        }

        .service-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .service-card p {
            color: var(--text-gray);
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .service-card .learn-more {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .service-card .learn-more:hover {
            gap: 12px;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            padding: 60px 0;
            background: var(--secondary);
            color: #fff;
        }
        .stats-bar .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
            text-align: center;
        }
        .stats-bar .stat-item h3 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .stats-bar .stat-item h3 span {
            color: #a78bfa;
        }
        .stats-bar .stat-item p {
            color: rgba(255, 255, 255, 0.60);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* ===== ABOUT ===== */
        .about {
            padding: 100px 0 80px;
            background: var(--bg-light);
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        .about-content .section-title {
            margin-bottom: 16px;
        }
        .about-content p {
            color: var(--text-gray);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
            margin-top: 8px;
        }
        .about-features li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .about-features li i {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .about-visual {
            background: linear-gradient(135deg, rgba(108, 61, 244, 0.06), rgba(167, 139, 250, 0.04));
            border-radius: var(--radius);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid rgba(108, 61, 244, 0.06);
        }
        .about-visual .block {
            background: var(--white);
            padding: 20px 24px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
        }
        .about-visual .block:hover {
            transform: translateX(6px);
            box-shadow: var(--shadow-hover);
        }
        .about-visual .block i {
            font-size: 1.8rem;
            color: var(--primary);
            width: 48px;
            text-align: center;
        }
        .about-visual .block h4 {
            font-weight: 700;
            font-size: 1rem;
        }
        .about-visual .block p {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin: 0;
        }

        /* ===== PORTFOLIO ===== */
        .portfolio {
            padding: 100px 0 80px;
            background: var(--white);
        }
        .portfolio .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
        }
        .portfolio .section-head .section-sub {
            margin: 0;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 48px;
        }

        .project-card {
            background: var(--bg-light);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 61, 244, 0.10);
            box-shadow: var(--shadow);
        }
        .project-card .thumb {
            height: 180px;
            background: linear-gradient(135deg, rgba(108, 61, 244, 0.10), rgba(167, 139, 250, 0.06));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: var(--primary);
            font-weight: 700;
        }
        .project-card .info {
            padding: 20px 22px 24px;
        }
        .project-card .info h4 {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }
        .project-card .info p {
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .project-card .info .tag {
            display: inline-block;
            background: rgba(108, 61, 244, 0.08);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 50px;
        }

        .view-all-wrap {
            text-align: center;
            margin-top: 44px;
        }

        /* ===== CTA ===== */
        .cta-section {
            padding: 80px 0;
            background: var(--secondary);
            color: #fff;
            text-align: center;
        }
        .cta-section h2 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
