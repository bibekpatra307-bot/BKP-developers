<!DOCTYPE html>
<html>
<head><title>Contact – BKP Developers</title></head>
<body>
    <header>...</header>
    <section class="page-banner"><h1>Get In Touch</h1><p>Let's Build Something Amazing Together</p></section>
    <section class="contact-page section-padding">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <p><span>📞</span> +91 12345 67890</p>
                    <p><span>✉️</span> hello@bkpdevelopers.com</p>
                    <p><span>📍</span> Indore, India</p>
                    <p><span>🕐</span> Mon - Sat: 10:00 AM - 7:00 PM</p>
                </div>
                <div class="contact-form">
                    <form id="contactForm">
                        <input type="text" id="name" placeholder="Your Name" required />
                        <input type="email" id="email" placeholder="Your Email" required />
                        <input type="tel" id="phone" placeholder="Phone Number" />
                        <input type="text" id="subject" placeholder="Subject" />
                        <textarea id="message" placeholder="Tell us about your project..." required></textarea>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                        <div id="formFeedback"></div>
                    </form>
                </div>
            </div>
            <div class="map"><iframe src="https://maps.google.com/maps?q=indore&output=embed" width="100%" height="400"></iframe></div>
        </div>
    </section>
    <footer>...</footer>
    <script src="assets/js/validation.js"></script>
</body>
</html>
